<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Demos Odoo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .module-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .module-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .module-item input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .module-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
            font-size: 0.95em;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .question-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }

        .question-text {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            position: relative;
        }

        .option-item input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .option-item label {
            display: block;
            padding: 15px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: normal;
        }

        .option-item input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-item label:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-right: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .button-container {
            text-align: center;
            margin-top: 30px;
        }

        .result-card {
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .result-card.basic {
            background: #d4edda;
            border: 3px solid #28a745;
        }

        .result-card.mid {
            background: #fff3cd;
            border: 3px solid #ffc107;
        }

        .result-card.advanced {
            background: #f8d7da;
            border: 3px solid #dc3545;
        }

        .result-title {
            font-size: 2em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .result-message {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .result-details {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }

        .result-details h4 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-details p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Clasificador de Demos Odoo</h1>
            <p>Determina quién debe realizar la demostración</p>
        </div>

        <div class="content">
            <!-- SECCIÓN 1: Configuración inicial -->
            <div class="section active" id="section1">
                <h2 style="margin-bottom: 25px; color: #667eea;">Configuración de la Demo</h2>

                <div class="form-group">
                    <label>Selecciona los módulos de interés:</label>
                    <div class="modules-grid" id="modulesGrid"></div>
                </div>

                <div class="form-group">
                    <label>Tamaño de la empresa:</label>
                    <select id="companySize">
                        <option value="">Selecciona una opción</option>
                        <option value="small">Pequeña (1-50 empleados)</option>
                        <option value="medium">Mediana (51-250 empleados)</option>
                        <option value="large">Grande (251+ empleados)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nivel de digitalización actual:</label>
                    <select id="digitalLevel">
                        <option value="">Selecciona una opción</option>
                        <option value="basic">Básico (Excel, procesos manuales)</option>
                        <option value="mid">Intermedio (Software específico por área)</option>
                        <option value="advanced">Avanzado (ERP actual, integraciones)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Complejidad de procesos:</label>
                    <select id="processComplexity">
                        <option value="">Selecciona una opción</option>
                        <option value="simple">Simple (Procesos lineales)</option>
                        <option value="moderate">Moderado (Múltiples áreas coordinadas)</option>
                        <option value="complex">Complejo (Alta integración, automatización)</option>
                    </select>
                </div>

                <div id="error1" class="error-message" style="display: none;"></div>

                <div class="button-container">
                    <button class="btn btn-primary" onclick="goToQuestions()">Siguiente →</button>
                </div>
            </div>

            <!-- SECCIÓN 2: Preguntas -->
            <div class="section" id="section2">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>

                <h2 style="margin-bottom: 25px; color: #667eea;">Preguntas de Evaluación</h2>
                <p style="margin-bottom: 30px; color: #666;">Responde las siguientes preguntas para determinar el nivel de complejidad de la demo.</p>

                <div id="questionsContainer"></div>

                <div id="error2" class="error-message" style="display: none;"></div>

                <div class="button-container">
                    <button class="btn btn-secondary" onclick="backToConfig()">← Regresar</button>
                    <button class="btn btn-primary" onclick="calculateResult()">Ver Resultado</button>
                </div>
            </div>

            <!-- SECCIÓN 3: Resultados -->
            <div class="section" id="section3">
                <h2 style="margin-bottom: 25px; color: #667eea;">Resultado de la Evaluación</h2>
                <div id="resultContainer"></div>

                <div class="button-container">
                    <button class="btn btn-secondary" onclick="restart()">🔄 Nueva Evaluación</button>
                </div>
            </div>
        </div>
    </div>

                { text: "Se optimiza continuamente", level: "ADV" }
            ]},
            { id: 50, question: "Para ti, el valor de la tecnología está en:", options: [
                { text: "Ordenar la operación", level: "BASIC" },
                { text: "Conectar procesos", level: "MID" },
                { text: "Transformar la forma de operar", level: "ADV" }
            ]}
        ];

        let selectedQuestions = [];
        let userAnswers = {};

        // Generar módulos
        function generateModules() {
            const grid = document.getElementById('modulesGrid');
            modules.forEach((module, idx) => {
                const div = document.createElement('div');
                div.className = 'module-item';
                div.innerHTML = `
                    <input type="checkbox" id="module_${idx}" value="${module}">
                    <label for="module_${idx}">${module}</label>
                `;
                grid.appendChild(div);
            });
        }

        // Ir a preguntas
        function goToQuestions() {
            const companySize = document.getElementById('companySize').value;
            const digitalLevel = document.getElementById('digitalLevel').value;
            const processComplexity = document.getElementById('processComplexity').value;
            const selectedModules = Array.from(document.querySelectorAll('#modulesGrid input:checked')).map(cb => cb.value);

            const error = document.getElementById('error1');

            if (selectedModules.length === 0) {
                error.textContent = '⚠️ Selecciona al menos un módulo';
                error.style.display = 'block';
                return;
            }

            if (!companySize || !digitalLevel || !processComplexity) {
                error.textContent = '⚠️ Completa todos los campos de configuración';
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';

            // Seleccionar 5 preguntas aleatorias
            const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
            selectedQuestions = shuffled.slice(0, 5);

            generateQuestions();

            document.getElementById('section1').classList.remove('active');
            document.getElementById('section2').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Generar preguntas
        function generateQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            selectedQuestions.forEach((q, idx) => {
                // Desordenar opciones
                const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="question-number">Pregunta ${idx + 1} de 5</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${shuffledOptions.map((opt, optIdx) => `
                            <div class="option-item">
                                <input type="radio" name="q${q.id}" value="${opt.level}" id="q${q.id}_${optIdx}" onchange="updateProgress()">
                                <label for="q${q.id}_${optIdx}">${opt.text}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Actualizar barra de progreso
        function updateProgress() {
            const answered = selectedQuestions.filter(q => 
                document.querySelector(`input[name="q${q.id}"]:checked`)
            ).length;
            const progress = (answered / selectedQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Calcular resultado
        function calculateResult() {
            userAnswers = {};
            let allAnswered = true;

            selectedQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (!selected) {
                    allAnswered = false;
                } else {
                    userAnswers[q.id] = selected.value;
                }
            });

            const error = document.getElementById('error2');

            if (!allAnswered) {
                error.textContent = '⚠️ Por favor responde todas las preguntas';
                error.style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            error.style.display = 'none';

            // Contar respuestas
            const counts = { BASIC: 0, MID: 0, ADV: 0 };
            Object.values(userAnswers).forEach(level => {
                counts[level]++;
            });

            // Determinar nivel
            let finalLevel, levelName, resultClass, responsible, message, details;

            if (counts.ADV >= 3) {
                finalLevel = 'ADV';
                levelName = 'AVANZADA';
                resultClass = 'advanced';
                responsible = '👨‍💼 Equipo Analista';
                message = 'Esta demo requiere conocimientos técnicos avanzados y debe ser atendida por el equipo de analistas.';
                details = `
                    <h4>📋 Información Adicional Requerida:</h4>
                    <p>• Detalle de integraciones necesarias</p>
                    <p>• Flujos de automatización específicos</p>
                    <p>• Requisitos de personalización avanzada</p>
                    <p>• Volumen de transacciones y usuarios</p>
                    <p>• Arquitectura de sistema actual</p>
                `;
            } else if (counts.MID >= 3 || (counts.MID >= 2 && counts.ADV >= 1)) {
                finalLevel = 'MID';
                levelName = 'MEDIA';
                resultClass = 'mid';
                responsible = '👤 Agente de Cuentas';
                message = 'Esta demo puede ser atendida por el agente de cuentas con soporte del equipo analista si es necesario.';
                details = `
                    <h4>✅ El agente puede manejar:</h4>
                    <p>• Configuraciones estándar de módulos</p>
                    <p>• Flujos de trabajo moderados</p>
                    <p>• Reportes y consultas intermedias</p>
                    <p>• Integraciones básicas</p>
                `;
            } else {
                finalLevel = 'BASIC';
                levelName = 'BÁSICA';
                resultClass = 'basic';
                responsible = '👤 Agente de Cuentas';
                message = 'Esta demo es básica y puede ser atendida completamente por el agente de cuentas.';
                details = `
                    <h4>✅ Demo incluye:</h4>
                    <p>• Navegación general del sistema</p>
                    <p>• Funcionalidades estándar</p>
                    <p>• Configuraciones básicas</p>
                    <p>• Reportes predefinidos</p>
                `;
            }

            // Obtener módulos seleccionados
            const selectedModules = Array.from(document.querySelectorAll('#modulesGrid input:checked'))
                .map(cb => cb.value).join(', ');

            const companySize = document.getElementById('companySize').selectedOptions[0].text;
            const digitalLevel = document.getElementById('digitalLevel').selectedOptions[0].text;
            const processComplexity = document.getElementById('processComplexity').selectedOptions[0].text;

            // Mostrar resultado
            const container = document.getElementById('resultContainer');
            container.innerHTML = `
                <div class="result-card ${resultClass}">
                    <div class="result-title">${levelName}</div>
                    <div class="result-message">
                        <strong>Responsable:</strong> ${responsible}<br><br>
                        ${message}
                    </div>
                </div>

                <div class="result-details">
                    <h4>📊 Resumen de la Evaluación:</h4>
                    <p><strong>Módulos seleccionados:</strong> ${selectedModules}</p>
                    <p><strong>Tamaño de empresa:</strong> ${companySize}</p>
                    <p><strong>Nivel de digitalización:</strong> ${digitalLevel}</p>
                    <p><strong>Complejidad de procesos:</strong> ${processComplexity}</p>
                    <br>
                    <p><strong>Distribución de respuestas:</strong></p>
                    <p>• Básicas: ${counts.BASIC}</p>
                    <p>• Medias: ${counts.MID}</p>
                    <p>• Avanzadas: ${counts.ADV}</p>
                </div>

                <div class="result-details">
                    ${details}
                </div>
            `;

            document.getElementById('section2').classList.remove('active');
            document.getElementById('section3').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Navegación
        function backToConfig() {
            document.getElementById('section2').classList.remove('active');
            document.getElementById('section1').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restart() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('companySize').selectedIndex = 0;
            document.getElementById('digitalLevel').selectedIndex = 0;
            document.getElementById('processComplexity').selectedIndex = 0;
            selectedQuestions = [];
            userAnswers = {};
            document.getElementById('progressBar').style.width = '0%';

            document.getElementById('section3').classList.remove('active');
            document.getElementById('section1').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Inicializar
        generateModules();
    </script>
</body>
</html>
